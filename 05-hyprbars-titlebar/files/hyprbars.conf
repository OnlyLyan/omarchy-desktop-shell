# Barra de título com botões (plugin hyprbars)
# Docs: https://github.com/hyprwm/hyprland-plugins/tree/main/hyprbars

plugin {
    hyprbars {
        bar_height = 28
        bar_padding = 10
        bar_button_padding = 8
        bar_text_size = 11
        bar_text_font = JetBrainsMono Nerd Font
        bar_text_align = left
        bar_part_of_window = true
        bar_precedence_over_border = true

        # Barra no escuro padrão (sem bar_color/col.text forçados)

        # Botões da DIREITA para a ESQUERDA (1a linha = mais a direita).
        # Formato: hyprbars-button = <cor-fundo>, <tamanho>, <ícone>, <comando>, <cor-ícone>
        # Ordem na tela (esq -> dir): fechar (vermelho), minimizar (amarelo), maximizar (verde).

        # Verde -> maximiza / restaura (losango)
        hyprbars-button = rgb(6cc06a), 16, ◇, hyprctl dispatch fullscreen 1, rgb(000000)

        # Amarelo -> minimiza (seta pra baixo); restaura com SUPER+ALT+M
        hyprbars-button = rgb(c9c24f), 16, ⌄, bash -c "$HOME/.local/bin/window-minimize", rgb(000000)

        # Vermelho -> fecha a janela (X)
        hyprbars-button = rgb(d35f5f), 16, ✗, hyprctl dispatch killactive, rgb(000000)
    }
}
