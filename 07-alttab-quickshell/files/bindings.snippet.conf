# -> ~/.config/hypr/bindings.conf
# Alt+Tab custom em Quickshell (overlay com thumbnails ao vivo, estilo Windows).
# Remove o cyclenext padrao do Omarchy; substitui o hyprshell.
unbind = ALT, TAB
unbind = ALT SHIFT, TAB
bind = ALT, TAB, exec, ~/.config/quickshell/scripts/alttab-next.sh
bind = ALT SHIFT, TAB, exec, ~/.config/quickshell/scripts/alttab-prev.sh
